name: Create Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. 0.2.4)'
        required: true
        default: '0.2.4'
      target_commitish:
        description: 'Commit SHA or branch to tag'
        required: true
        default: 'main'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.target_commitish }}
          fetch-depth: 0

      - name: Create Release ${{ github.event.inputs.tag }}
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const tag = context.payload.inputs.tag;
            const target = context.payload.inputs.target_commitish;
            const notesPath = `release-notes/${tag}.md`;
            const notes = fs.existsSync(notesPath)
              ? fs.readFileSync(notesPath, 'utf8')
              : '';

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              target_commitish: target,
              name: tag,
              body: notes,
              draft: false,
              prerelease: false,
            });

            console.log(`Release ${tag} created successfully.`);
